<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        .container{
            background-color: yellow;
            padding: 10px;
            display: flex;
            justify-content:center;
            align-items:center;
            /* flex-wrap: wrap; */
            flex-direction: row;
        }
        .box{
            width: 200px;
            background-color: honeydew;
            margin: 10px;
            border: 1px solid black;
        }
        .box-1{
            height: 100px;
            flex-shrink: 0;
            order:2;
        }
        .box-2{
            height: 200px;
            flex-grow: 2;
            flex-basis: 0;
            align-self: center;
            order:3 ;
        }
        .box-3{
            height: 300px;
            flex-grow: 1;
            flex-basis: 0;
            order: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box-1">box-1</div>
        <div class="box box-2">box-2</div>
        <div class="box box-3">box-3</div>
    </div>
</body>
</html>
