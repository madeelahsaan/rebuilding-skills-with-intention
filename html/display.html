<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display</title>
    <style>
        .div1{
            display: block; /* initial display property of div is block*/
            background: blue;
        }
        .span1{
            /* intial property of span is inline */
            display: none;
            background-color: cyan;
        }
        .span2{
            display: inline;
            background-color: purple;
        }
        .div2{
            background-color: blueviolet;
        }
        img{

            display: inline-block;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="div1">this is div1</div>
    <span class="span1">this is span1</span>
    <img src="../images/YouTube Logo.png" alt="YouTube Logo">
    <span class="span2">this is span2</span>
    <div class="div2">this is div2</div>
</body>
</html>
