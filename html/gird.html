<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .grid-container{
            width: 600px;
            height: 600px;
            background-color: aqua;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            grid-gap: 5px;
            padding: 5px;
        }
        .griditem{
            background-color: cadetblue;
        }
        .grid-item-1{
            grid-column: span 1 ;
        }
        .grid-item-2{
            grid-column:span 2;
        }
        .grid-item-3{
            grid-column: span 2;
        }
        .grid-item-4{
            grid-row: span 2;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="griditem grid-item-1"></div>
        <div class="griditem grid-item-2"></div>
        <div class="griditem grid-item-3"></div>
        <div class="griditem grid-item-4"></div>
        <div class="griditem grid-item-5"></div>
        <div class="griditem grid-item-6"></div>
    </div>
</body>
</html>
