<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        .container {
            width: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 10px;
        }
        .image img {
            width: 100%;
            height: auto;
            margin:auto;
            border-radius: 16px;
        }
        .span-box {
            margin: 10px ;
        }
        .span-box span {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            padding: 5px 10px;
            margin: 0px 5px;
            border-radius: 14px;
        }
        .text h2 {
            margin-top: 20px;
        }
        .button{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button{
            background-color: #8fcf91;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image"><img src="../images/jean-carlo-emer-QDEXHid5sAM-unsplash.jpg" alt="card image" width="300" height="200"></div>
        <div class="span-box"><span>Nature</span><span>Sea</span></div>
        <div class="text">
            <h2>Lago di Braies</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Et, harum molestias quasi officia laborum ullam perferendis doloribus minima, deleniti, enim quas. Ipsum nam voluptates nobis? Dolor laborum praesentium quaerat porro.</p>
        </div>
        <div class="button">
            <button>Read me</button>
        </div>
    </div>
</body>
</html>
